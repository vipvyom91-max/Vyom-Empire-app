plugins {
    id 'com.android.application'
}

android {
    namespace 'com.vyomthakur.empire'
    compileSdk 34

    defaultConfig {
        applicationId "com.vyomthakur.empire"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
